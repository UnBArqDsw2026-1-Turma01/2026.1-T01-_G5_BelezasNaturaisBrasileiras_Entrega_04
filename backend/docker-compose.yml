services:
  postgres:
    image: postgres:15-alpine
    container_name: bnb_postgres
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bnb_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bnb_pgadmin
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - bnb_network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    name: bnb_postgres_data
  pgadmin_data:
    name: bnb_pgadmin_data

networks:
  bnb_network:
    name: bnb_network
